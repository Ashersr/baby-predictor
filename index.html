<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baby Predictor ✨</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pink: #ff8fab;
      --pink-light: #ffb3c6;
      --pink-soft: #fff0f3;
      --blue: #a2d2ff;
      --blue-light: #bde0fe;
      --blue-soft: #f0f8ff;
      --purple: #c77dff;
      --purple-light: #e0aaff;
      --bg: #fdf4ff;
      --text: #3d1c6e;
      --subtext: #8b6da0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Floating background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 420px; height: 420px; background: var(--pink-light); top: -100px; left: -120px; animation-delay: 0s; }
    .blob-2 { width: 380px; height: 380px; background: var(--blue-light);  bottom: -80px; right: -100px; animation-delay: 3s; }
    .blob-3 { width: 280px; height: 280px; background: var(--purple-light); bottom: 20%; left: 5%; animation-delay: 6s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.05); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      border-radius: 32px;
      padding: 56px 52px;
      max-width: 480px;
      width: 90vw;
      text-align: center;
      box-shadow:
        0 8px 40px rgba(199, 125, 255, 0.12),
        0 2px 8px rgba(0,0,0,0.06);
    }

    .emoji-header {
      font-size: 64px;
      line-height: 1;
      margin-bottom: 16px;
      display: block;
      animation: bob 3s ease-in-out infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 1rem;
      color: var(--subtext);
      font-weight: 600;
      margin-bottom: 40px;
    }

    /* States */
    #state-idle,
    #state-loading,
    #state-result {
      transition: opacity 0.3s ease;
    }

    /* Button */
    .predict-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, #ff8fab 0%, #c77dff 100%);
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-size: 1.15rem;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      padding: 18px 42px;
      cursor: pointer;
      box-shadow:
        0 4px 24px rgba(199, 125, 255, 0.4),
        0 1px 4px rgba(0,0,0,0.08);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      user-select: none;
    }

    .predict-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow:
        0 8px 32px rgba(199, 125, 255, 0.5),
        0 2px 8px rgba(0,0,0,0.10);
    }

    .predict-btn:active {
      transform: scale(0.97);
    }

    .predict-btn .btn-emoji {
      font-size: 1.3rem;
    }

    /* Loading */
    #state-loading {
      display: none;
    }

    .thinking-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 5px solid rgba(199, 125, 255, 0.15);
      border-top-color: #c77dff;
      border-right-color: #ff8fab;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .thinking-text {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: 0.02em;
    }

    .dots span {
      display: inline-block;
      animation: blink 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40%           { opacity: 1; }
    }

    /* Result */
    #state-result {
      display: none;
    }

    .result-emoji {
      font-size: 80px;
      line-height: 1;
      display: block;
      margin-bottom: 20px;
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pop {
      from { transform: scale(0.4) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);    opacity: 1; }
    }

    .result-text {
      font-size: 1.6rem;
      font-weight: 900;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .result-text.baby {
      color: #e0459b;
    }

    .result-text.no-baby {
      color: #6a5acd;
    }

    .result-sub {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--subtext);
      margin-bottom: 32px;
    }

    .try-again-btn {
      background: none;
      border: 2.5px solid var(--purple-light);
      color: var(--purple);
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      border-radius: 50px;
      padding: 12px 32px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease, transform 0.15s ease;
    }

    .try-again-btn:hover {
      background: var(--purple-light);
      color: var(--text);
      transform: translateY(-1px);
    }

    .try-again-btn:active {
      transform: scale(0.97);
    }

    /* Confetti canvas */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--pink), var(--purple));
      margin: 0 auto 32px;
    }
  </style>
</head>
<body>

  <!-- Floating blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Confetti -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Card -->
  <div class="card">
    <span class="emoji-header">👶</span>
    <h1>Will and Reilly's baby Predictor</h1>
    <p class="subtitle">The universe decides. You just press the button.</p>
    <div class="divider"></div>

    <!-- IDLE STATE -->
    <div id="state-idle">
      <button class="predict-btn" onclick="startPrediction()">
        <span class="btn-emoji">🔮</span>
        Is today the day?
      </button>
    </div>

    <!-- LOADING STATE -->
    <div id="state-loading">
      <div class="thinking-wrap">
        <div class="spinner"></div>
        <p class="thinking-text">
          Thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span>
        </p>
      </div>
    </div>

    <!-- RESULT STATE -->
    <div id="state-result">
      <span class="result-emoji" id="result-emoji"></span>
      <p class="result-text" id="result-text"></p>
      <p class="result-sub"  id="result-sub"></p>
      <button class="try-again-btn" onclick="reset()">Try Again ↩</button>
    </div>
  </div>

  <script>
    const BABY_CHANCE = 0.51;   // 51% chance of baby
    const THINK_MS   = 2200;    // loading duration

    function show(id) {
      ['state-idle','state-loading','state-result'].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
      });
    }

    function startPrediction() {
      show('state-loading');
      setTimeout(() => {
        const hasBaby = Math.random() < BABY_CHANCE;
        showResult(hasBaby);
      }, THINK_MS);
    }

    function showResult(hasBaby) {
      const emoji = document.getElementById('result-emoji');
      const text  = document.getElementById('result-text');
      const sub   = document.getElementById('result-sub');

      if (hasBaby) {
        emoji.textContent = '🍼';
        text.textContent  = 'Baby is coming today!';
        text.className    = 'result-text baby';
        sub.textContent   = 'Congratulations! The stork is on its way. 🎀';
        launchConfetti();
      } else {
        emoji.textContent = '🌙';
        text.textContent  = 'No baby today.';
        text.className    = 'result-text no-baby';
        sub.textContent   = 'Maybe next time! The cosmos has other plans. ✨';
      }

      // Re-trigger the pop animation
      emoji.style.animation = 'none';
      emoji.offsetHeight;   // reflow
      emoji.style.animation = '';

      show('state-result');
    }

    function reset() {
      stopConfetti();
      show('state-idle');
    }

    /* ── Confetti ──────────────────────────────────── */
    const canvas = document.getElementById('confetti-canvas');
    const ctx    = canvas.getContext('2d');
    let particles = [];
    let animId    = null;

    const COLORS = ['#ff8fab','#c77dff','#a2d2ff','#ffd6e7','#fdffb6','#caffbf'];

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function launchConfetti() {
      particles = [];
      for (let i = 0; i < 140; i++) {
        particles.push({
          x:    Math.random() * canvas.width,
          y:    Math.random() * canvas.height * 0.4 - canvas.height * 0.2,
          r:    Math.random() * 6 + 4,
          d:    Math.random() * 4 + 2,
          color: COLORS[Math.floor(Math.random() * COLORS.length)],
          tilt: Math.random() * 20 - 10,
          tiltSpeed: Math.random() * 0.1 + 0.05,
          tiltAngle: 0,
          opacity: 1,
          shape: Math.random() > 0.5 ? 'circle' : 'rect',
        });
      }
      if (animId) cancelAnimationFrame(animId);
      drawConfetti();
    }

    function drawConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let alive = false;
      particles.forEach(p => {
        p.tiltAngle += p.tiltSpeed;
        p.y += p.d;
        p.tilt = Math.sin(p.tiltAngle) * 15;
        if (p.y < canvas.height + 20) alive = true;

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.opacity);
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate((p.tilt * Math.PI) / 180);

        if (p.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, p.r, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
        }
        ctx.restore();
      });

      if (alive) {
        animId = requestAnimationFrame(drawConfetti);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    function stopConfetti() {
      if (animId) {
        cancelAnimationFrame(animId);
        animId = null;
      }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = [];
    }
  </script>
</body>
</html>
